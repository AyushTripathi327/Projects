<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sorting Visualizer</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h1>Sorting Visualizer</h1>

    <div id="container"></div>

    <div class="buttons">

        <button id="newBtn">
            New Array
        </button>

        <button id="bubbleBtn">
            Bubble Sort
        </button>

        <button id="mergeBtn">
            Merge Sort
        </button>

    </div>

    <div class="info">

        <h3 id="algo"></h3>

        <p id="time"></p>

        <p id="space"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
